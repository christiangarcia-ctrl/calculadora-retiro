<style>
  :root{
    --navy:#0A1D66;
    --navy-2:#122B7A;
    --blue:#1A4BFF;
    --blue-soft:#EAF0FF;
    --gold:#E8A63B;
    --gold-soft:#FFF3DE;
    --cream:#F6F8FC;
    --panel:#FFFFFF;
    --line:#DCE4F0;
    --text:#17304B;
    --muted:#66758C;
    --success:#10B981;
    --success-soft:#EAFBF5;
    --danger:#E85D5D;
    --warning:#F59E0B;
    --shadow:0 18px 40px rgba(11,33,92,.12);
    --radius:22px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(180deg,#EEF3FB 0%, #F8FAFD 48%, #F4F7FB 100%);
    color:var(--text);
    font-size:14px;
    overflow:hidden;
  }

  .app-container{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:18px;
    height:100vh;
    padding:18px;
    position:relative;
  }

  .control-panel{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    color:#fff;
    border-radius:28px;
    padding:20px 18px 22px;
    overflow-y:auto;
    box-shadow:var(--shadow);
    position:relative;
    z-index:2;
  }

  .results-panel{
    background:transparent;
    overflow-y:auto;
    position:relative;
    min-height:0;
  }

  .logo-header{
    margin-bottom:16px;
    padding:14px 14px 16px;
    border-radius:20px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
  }

  .logo-header img{
    height:34px !important;
    width:auto !important;
    max-width:140px !important;
    object-fit:contain !important;
    filter:none !important;
    -webkit-filter:none !important;
  }

  .logo-title{
    font-family:'Playfair Display',serif;
    font-size:21px;
    font-weight:900;
    letter-spacing:-.02em;
    margin-bottom:3px;
  }

  .logo-subtitle{
    font-size:12px;
    opacity:.82;
    letter-spacing:.04em;
  }

  .mini-brand-note{
    font-size:11px;
    opacity:.72;
    margin-top:8px;
    letter-spacing:.04em;
  }

  .asesoria-box{
    background:linear-gradient(180deg,rgba(232,166,59,.16),rgba(255,255,255,.06));
    border:1px solid rgba(232,166,59,.34);
    border-radius:20px;
    padding:16px;
    margin-bottom:18px;
    text-align:left;
  }

  .asesoria-title{
    font-size:14px;
    font-weight:800;
    margin-bottom:8px;
    color:#FFE8B2;
  }

  .asesoria-instruccion{
    font-size:11px;
    color:rgba(255,255,255,.72);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .asesoria-mensaje{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    color:#fff;
    padding:10px 12px;
    border-radius:14px;
    font-size:12px;
    font-weight:700;
    margin-bottom:8px;
    font-family:'DM Sans',sans-serif;
  }

  .asesoria-phone{
    font-size:19px;
    font-weight:900;
    color:#fff;
    letter-spacing:.02em;
    font-family:'DM Mono',monospace;
  }

  .live-note{
    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.14);
    border-radius:18px;
    padding:14px;
    margin-bottom:16px;
  }

  .live-note strong{
    display:block;
    font-size:13px;
    color:#FFF1CC;
    margin-bottom:6px;
  }

  .live-note p{
    font-size:12px;
    line-height:1.45;
    color:rgba(255,255,255,.82);
  }

  .step-indicator{
    display:inline-flex;
    width:26px;
    height:26px;
    align-items:center;
    justify-content:center;
    background:var(--gold);
    color:var(--navy);
    border-radius:999px;
    font-weight:900;
    font-size:13px;
    margin-right:8px;
    flex:0 0 auto;
  }

  .section-block{margin-bottom:18px;}

  .section-header{
    font-family:'Playfair Display',serif;
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
    color:#FFF4DA;
    letter-spacing:-.01em;
    display:flex;
    align-items:center;
  }

  .field-grid{
    display:grid;
    gap:12px;
  }

  .field-card{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.11);
    border-radius:18px;
    padding:12px;
  }

  .form-group{margin-bottom:0}
  .form-label{
    display:block;
    font-size:10px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.12em;
    margin-bottom:7px;
    opacity:.78;
  }

  .form-input{
    width:100%;
    padding:13px 14px;
    background:rgba(255,255,255,.11);
    border:1px solid rgba(255,255,255,.16);
    border-radius:14px;
    color:#fff;
    font-size:17px;
    font-weight:700;
    transition:all .2s;
    font-family:'DM Sans',sans-serif;
  }

  .form-input.suggested{
    background:rgba(232,166,59,.16);
    border-color:rgba(232,166,59,.45);
  }

  .form-input:focus{
    outline:none;
    background:rgba(255,255,255,.16);
    border-color:rgba(232,166,59,.8);
    box-shadow:0 0 0 4px rgba(232,166,59,.14);
  }

  .form-input::placeholder{color:rgba(255,255,255,.45);}
  .form-input:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .form-hint{
    font-size:11px;
    opacity:.72;
    margin-top:6px;
    line-height:1.45;
  }

  .suggestion-badge{
    display:inline-block;
    background:var(--gold);
    color:var(--navy);
    padding:4px 9px;
    border-radius:999px;
    font-size:10px;
    font-weight:900;
    margin-bottom:8px;
  }

  .btn-primary{
    width:100%;
    padding:15px 16px;
    background:linear-gradient(180deg,#F2B24A,#D89423);
    color:var(--navy);
    border:none;
    border-radius:16px;
    font-weight:900;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.12em;
    cursor:pointer;
    transition:all .25s;
    box-shadow:0 10px 22px rgba(232,166,59,.26);
    font-family:'DM Sans',sans-serif;
  }

  .btn-primary:hover{transform:translateY(-1px);}

  .btn-secondary{
    background:transparent;
    border:1px solid rgba(255,255,255,.22);
    color:#fff;
    box-shadow:none;
    margin-top:8px;
  }

  .collapsible-section{
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;
    margin-top:14px;
    overflow:hidden;
    background:rgba(255,255,255,.04);
  }

  .collapsible-header{
    padding:13px 14px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    user-select:none;
  }

  .collapsible-title{
    font-size:12px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .collapsible-icon{transition:transform .2s;}
  .collapsible-header.open .collapsible-icon{transform:rotate(180deg);}
  .collapsible-content{display:none;padding:0 14px 14px;}
  .collapsible-content.visible{display:block;}

  .error-alert{
    display:none;
    background:rgba(232,93,93,.16);
    border:1px solid rgba(232,93,93,.35);
    color:#FFD3D3;
    padding:10px 12px;
    border-radius:14px;
    font-size:12px;
    margin-bottom:12px;
    font-weight:600;
  }

  .error-alert.visible{display:block;}

  .live-shell{
    display:grid;
    gap:18px;
    min-height:100%;
  }

  .live-banner{
    background:linear-gradient(135deg,var(--navy) 0%, #234DD8 100%);
    border-radius:30px;
    padding:18px 22px;
    color:#fff;
    position:sticky;
    top:0;
    z-index:5;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .live-banner::after{
    content:'';
    position:absolute;
    width:280px;
    height:280px;
    right:-40px;
    top:-120px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 72%);
    pointer-events:none;
  }

  .live-banner-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    position:relative;
    z-index:1;
  }

  .live-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 11px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    font-size:11px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#F4E8C5;
    margin-bottom:10px;
  }

  .live-title{
    font-family:'Playfair Display',serif;
    font-size:34px;
    line-height:1.02;
    letter-spacing:-.03em;
    max-width:620px;
  }

  .live-subtitle{
    margin-top:8px;
    color:rgba(255,255,255,.78);
    font-size:13px;
    max-width:560px;
    line-height:1.45;
  }

  .hero-actions{
    display:flex;
    gap:10px;
    align-self:flex-start;
  }

  .btn-action{
    padding:11px 16px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    color:#fff;
    border-radius:14px;
    font-weight:800;
    font-size:11px;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:.09em;
    transition:.2s;
    backdrop-filter:blur(10px);
  }

  .btn-action.accent{
    background:var(--gold);
    color:var(--navy);
    border-color:transparent;
  }

  .btn-action:hover{transform:translateY(-1px);}

  .ticker{
    margin-top:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    padding:10px 12px;
    border-radius:18px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.15);
  }

  .ticker-copy{
    font-size:14px;
    font-weight:800;
    color:#fff;
  }

  .ticker-note{
    font-size:11px;
    color:rgba(255,255,255,.7);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .hero-stage{
    display:grid;
    grid-template-columns:minmax(260px, 1.08fr) minmax(260px, .92fr);
    gap:18px;
    align-items:stretch;
  }

  .focus-card,
  .summary-card,
  .compact-card,
  .retirement-section,
  .detail-wrapper,
  .comparison-panel{
    background:var(--panel);
    border:1px solid rgba(10,29,102,.06);
    border-radius:28px;
    box-shadow:var(--shadow);
  }

  .focus-card{
    padding:28px;
    background:linear-gradient(180deg,#FFFFFF 0%, #F8FAFF 100%);
  }

  .focus-kicker{
    font-size:11px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--blue);
    margin-bottom:10px;
  }

  .focus-main-label{
    font-size:14px;
    color:var(--muted);
    margin-bottom:10px;
  }

  .focus-main-value{
    font-family:'Playfair Display',serif;
    font-size:72px;
    line-height:.95;
    letter-spacing:-.04em;
    color:var(--navy);
    margin-bottom:12px;
    word-break:break-word;
  }

  .focus-main-caption{
    display:inline-flex;
    gap:8px;
    align-items:center;
    padding:8px 12px;
    border-radius:999px;
    background:var(--gold-soft);
    color:#7B5717;
    font-size:12px;
    font-weight:800;
    margin-bottom:18px;
  }

  .support-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  .compact-card{
    padding:16px 16px 18px;
    min-width:0;
  }

  .compact-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:var(--muted);
    font-weight:800;
    margin-bottom:7px;
  }

  .compact-value{
    font-family:'DM Mono',monospace;
    font-size:24px;
    line-height:1.1;
    color:var(--navy);
    font-weight:700;
  }

  .compact-caption{
    margin-top:6px;
    font-size:11px;
    color:var(--muted);
  }

  .summary-card{
    padding:18px;
    background:linear-gradient(180deg,#0D235F 0%, #17368E 100%);
    color:#fff;
    overflow:hidden;
  }

  .summary-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
  }

  .summary-title{
    font-family:'Playfair Display',serif;
    font-size:24px;
    letter-spacing:-.02em;
  }

  .summary-pill{
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.16);
    font-size:10px;
    font-weight:900;
    letter-spacing:.1em;
    text-transform:uppercase;
  }

  .summary-grid{
    display:grid;
    gap:12px;
  }

  .summary-metric{
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.11);
  }

  .summary-label{
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:rgba(255,255,255,.7);
    font-weight:800;
    margin-bottom:6px;
  }

  .summary-value{
    font-family:'DM Mono',monospace;
    font-size:25px;
    line-height:1.08;
    font-weight:700;
    color:#fff;
  }

  .summary-foot{
    margin-top:14px;
    padding:12px 14px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    font-size:12px;
    line-height:1.5;
    color:rgba(255,255,255,.82);
  }

  .comparison-panel{
    padding:22px;
  }

  .section-title{
    font-family:'Playfair Display',serif;
    font-size:28px;
    color:var(--navy);
    letter-spacing:-.02em;
    margin-bottom:8px;
  }

  .section-sub{
    color:var(--muted);
    font-size:13px;
    margin-bottom:18px;
  }

  .comparison-strip{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:14px;
  }

  .comp-box{
    padding:16px 14px;
    border-radius:22px;
    font-size:11px;
    font-weight:700;
    text-align:left;
    border:1px solid transparent;
  }

  .comp-box.mattress{
    background:#FFF1F1;
    color:#8F2E2E;
    border-color:#F5CACA;
  }

  .comp-box.bank{
    background:#FFF4E9;
    color:#9C4E18;
    border-color:#F6D0A9;
  }

  .comp-box.plan{
    background:var(--success-soft);
    color:#06694E;
    border-color:#BAF1DE;
  }

  .comp-box.afore{
    background:#FFF7DC;
    color:#8A6413;
    border-color:#F3DE90;
  }

  .comp-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.12em;
    font-weight:900;
    margin-bottom:10px;
  }

  .comp-value{
    font-family:'DM Mono',monospace;
    font-size:22px;
    line-height:1.15;
    margin-bottom:10px;
  }

  .bar-track{
    width:100%;
    height:9px;
    border-radius:999px;
    background:rgba(10,29,102,.07);
    overflow:hidden;
    margin:8px 0 10px;
  }

  .bar-fill{
    height:100%;
    border-radius:999px;
  }

  .comp-loss{
    font-size:11px;
    font-weight:800;
  }

  .comparison-message{
    padding:14px 16px;
    border-radius:18px;
    background:#F4EBD1;
    color:#6C5114;
    font-size:13px;
    font-weight:800;
  }

  .chart-section{display:none;}

  .retirement-section{
    display:none;
    padding:22px;
    background:linear-gradient(180deg,#FFFFFF 0%, #F6FFFB 100%);
    border:1px solid #BDEDDC;
  }

  .retirement-section.visible{
    display:block;
    animation:fadeIn .35s ease-out;
  }

  @keyframes fadeIn{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }

  .retirement-title{
    font-family:'Playfair Display',serif;
    font-size:28px;
    color:#08684F;
    margin-bottom:14px;
  }

  .retirement-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
  }

  .retirement-item{
    background:#fff;
    padding:16px;
    border-radius:20px;
    border:1px solid #D6F5E8;
  }

  .retirement-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:#3D8B73;
    font-weight:900;
    margin-bottom:7px;
  }

  .retirement-value{
    font-family:'DM Mono',monospace;
    font-size:24px;
    line-height:1.08;
    color:#065F46;
    font-weight:700;
  }

  .detail-wrapper{
    padding:18px 20px;
  }

  .detail-toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    font-weight:800;
    color:var(--navy);
    font-size:14px;
    user-select:none;
  }

  .detail-toggle .icon{transition:transform .2s;}
  .detail-toggle.open .icon{transform:rotate(180deg);}

  .detail-content{
    display:none;
    margin-top:14px;
    max-height:240px;
    overflow-y:auto;
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  .detail-content.visible{display:block;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }

  th{
    background:#132B76;
    color:white;
    text-align:left;
    padding:10px 12px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:10px;
  }

  td{
    padding:10px 12px;
    border-bottom:1px solid #ECF0F7;
    color:var(--text);
  }

  tr:hover{background:#F7FAFF;}
  tr:last-child td{border-bottom:none;}

  .whatsapp-float{
    position:fixed;
    right:26px;
    bottom:22px;
    background:#25D366;
    color:white;
    padding:15px 22px;
    border-radius:999px;
    font-weight:900;
    font-size:14px;
    box-shadow:0 16px 30px rgba(37,211,102,.28);
    cursor:pointer;
    transition:.25s;
    z-index:80;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .whatsapp-float:hover{transform:translateY(-1px);}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:rgba(0,0,0,.04)}
  ::-webkit-scrollbar-thumb{background:#A9B8D9;border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:#7F94C6}

  .report-view{display:none}

  @media (max-width:1260px){
    .app-container{grid-template-columns:330px 1fr}
    .hero-stage{grid-template-columns:1fr}
    .support-grid{grid-template-columns:1fr}
    .comparison-strip{grid-template-columns:repeat(2,1fr)}
    .retirement-grid{grid-template-columns:repeat(2,1fr)}
    .live-title{font-size:30px}
    .focus-main-value{font-size:58px}
  }

  @media (max-width:960px){
    html,body{overflow:auto}
    .app-container{
      grid-template-columns:1fr;
      height:auto;
      min-height:100vh;
    }
    .live-banner-row{flex-direction:column;align-items:flex-start}
    .hero-actions{width:100%}
    .hero-actions .btn-action{flex:1}
    .comparison-strip,
    .retirement-grid,
    .support-grid{grid-template-columns:1fr}
    .focus-main-value{font-size:48px}
  }

  @media print{
    body{
      background:white !important;
      color:#000 !important;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
      font-size:10px;
      overflow:visible;
    }
    html,body{height:auto;overflow:visible}
    .app-container{display:none !important}
    .whatsapp-float{display:none !important}
    .report-view{
      display:block !important;
      max-width:800px;
      margin:0 auto;
      padding:10mm;
    }
  }
</style>
